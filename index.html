<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>#myfuneralplaylist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;500;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   GLOBAL RESET & FRAMEWORK
   ═══════════════════════════════════════════ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

:root {
  --page-width: 402px;
  --page-height: 874px;
  --draft-scale: 1.8656716418;
  --page-scale: 1.8656716418;
  --card-large: 230px;
  --card-small: 207px;
  --card-gap: 20px;
  --card-slot: 239px;
  --text-primary: rgba(255, 255, 255, 0.96);
  --text-secondary: rgba(255, 255, 255, 0.5);
  --word-glow: #64D6FF;
  --line-color: rgba(255, 255, 255, 0.16);
  --text-danger: #ffb7c0;
}

html, body {
  width: 402px;
  height: 874px;
  overflow: hidden;
}

html {
  background: #060d15;
}

body {
  width: var(--page-width);
  height: var(--page-height);
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  color: var(--text-primary);
  background: #060d15;
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(var(--page-scale));
  transform-origin: center center;
  will-change: transform;
}

/* ═══════════════════════════════════════════
   PAGE TRANSITION FRAMEWORK
   ═══════════════════════════════════════════ */
.pages-wrapper {
  width: 402px;
  height: 874px;
  position: relative;
  overflow: hidden;
}

.page {
  width: 402px;
  height: 874px;
  position: absolute;
  top: 0;
  left: 0;
  overflow: hidden;
  will-change: transform;
  user-select: none;
}

/* Cover slides horizontally */
#page0 {
  transform: translateX(0);
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 10;
}
#page0.exit-left {
  transform: translateX(-100%);
}

/* All other pages slide vertically */
.q-page {
  transform: translateY(100%);
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.q-page.active {
  transform: translateY(0);
}
.q-page.exit-up {
  transform: translateY(-100%);
}

/* Page1 special: enters from right when coming from cover */
#page1.from-right {
  transform: translateX(100%);
}
#page1.from-right.active {
  transform: translateX(0);
}

/* ═══════════════════════════════════════════
   PAGE 0: COVER PAGE STYLES
   ═══════════════════════════════════════════ */
#page0 {
  background:
    radial-gradient(ellipse 90% 55% at 50% 28%, rgba(18, 55, 90, 0.85) 0%, transparent 70%),
    linear-gradient(180deg, #0b1a28 0%, #07101a 60%, #060e16 100%);
}

#page0 .scene {
  position: absolute;
  left: 0;
  top: 0;
  width: 402px;
  height: 570px;
  perspective: 620px;
  perspective-origin: 50% 52%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#page0 .carousel-3d {
  transform-style: preserve-3d;
  animation: p0spin 18s linear infinite;
  will-change: transform;
}

@keyframes p0spin {
  from { transform: rotateX(-20deg) rotateY(0deg); }
  to   { transform: rotateX(-20deg) rotateY(-360deg); }
}

#page0 .album {
  position: absolute;
  width: 59px;
  height: 59px;
  top: -29.5px;
  left: -29.5px;
  border-radius: 4px;
  overflow: hidden;
  box-shadow:
    0 4px 14px rgba(0, 0, 0, 0.75),
    0 0 0 1px rgba(255, 255, 255, 0.07);
}

#page0 .album img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

#page0 .cover-title-main {
  position: absolute;
  top: 573px;
  left: 20px;
  right: 78px;
  font-size: 40px;
  font-weight: 900;
  line-height: 50px;
  letter-spacing: -0.05em;
  color: #ffffff;
}

#page0 .cover-title-sub {
  position: absolute;
  bottom: 217px;
  left: 20px;
  right: 20px;
  font-size: 20px;
  font-weight: 400;
  line-height: 30px;
  letter-spacing: -0.05em;
  color: #ffffff;
}

#page0 .cover-next-btn {
  position: absolute;
  right: 20px;
  bottom: 58px;
  width: 68px;
  height: 68px;
  object-fit: contain;
  cursor: pointer;
  border: none;
  background: none;
}

/* ═══════════════════════════════════════════
   PAGE 1: QUESTION SCENE STYLES
   ═══════════════════════════════════════════ */
#page1 {
  background:
    radial-gradient(circle at 50% 28%, rgba(39, 86, 139, 0.52) 0%, rgba(11, 24, 39, 0.08) 36%, transparent 64%),
    radial-gradient(circle at 50% 76%, rgba(63, 103, 170, 0.16) 0%, transparent 44%),
    linear-gradient(180deg, #0a1623 0%, #08111c 48%, #060d15 100%);
}

#page1::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px),
    radial-gradient(circle at 74% 21%, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px),
    radial-gradient(circle at 29% 56%, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px),
    radial-gradient(circle at 68% 74%, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px),
    radial-gradient(circle at 84% 88%, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px);
  pointer-events: none;
  opacity: 0.8;
}

#page1 .page-inner {
  position: absolute;
  top: 0;
  left: 0;
  width: var(--page-width);
  height: var(--page-height);
  overflow: hidden;
  user-select: none;
  will-change: transform;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
#page1 .page-inner.q-exit-up {
  transform: translateY(-100%);
}
#page1 .page-inner.q-exit-down {
  transform: translateY(100%);
}
#page1 .page-inner.q-enter-from-below {
  transform: translateY(100%);
  transition: none;
}
#page1 .page-inner.q-enter-from-above {
  transform: translateY(-100%);
  transition: none;
}
#page1 .page-inner.q-snapshot {
  pointer-events: none;
}

#page1 .title-line1,
#page1 .title-line2 {
  position: absolute;
  z-index: 2;
  color: var(--text-primary);
  letter-spacing: -0.05em;
}

#page1 .title-line1 {
  top: 78px;
  left: 20px;
  right: 96px;
  font-size: 24px;
  font-weight: 900;
  line-height: 30px;
}

#page1 .title-line2 {
  top: 116px;
  left: 20px;
  right: 20px;
  font-size: 20px;
  font-weight: 500;
  line-height: 30px;
  text-align: right;
}

#page1 .carousel-area {
  position: absolute;
  top: 234px;
  left: 0;
  width: var(--page-width);
  height: 230px;
  overflow: visible;
  touch-action: none;
}

#page1 .carousel-track {
  position: absolute;
  top: 0;
  height: 230px;
  display: flex;
  align-items: center;
  will-change: transform;
  cursor: grab;
}

#page1 .carousel-track.dragging {
  cursor: grabbing;
}

#page1 .carousel-item {
  flex: 0 0 var(--card-slot);
  width: var(--card-slot);
  height: 230px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.74;
  transition: opacity 0.28s ease;
}

#page1 .carousel-item.active {
  opacity: 1;
}

#page1 .card-shell {
  position: relative;
  width: var(--card-small);
  height: var(--card-small);
  border-radius: 6px;
  overflow: hidden;
  box-shadow:
    0 18px 34px rgba(0, 0, 0, 0.42),
    0 0 0 1px rgba(255, 255, 255, 0.07);
  transition:
    width 0.32s ease,
    height 0.32s ease,
    transform 0.32s ease,
    box-shadow 0.32s ease,
    opacity 0.32s ease;
}

#page1 .carousel-item.active .card-shell {
  width: var(--card-large);
  height: var(--card-large);
  transform: translateZ(0);
  box-shadow:
    0 22px 42px rgba(0, 0, 0, 0.5),
    0 0 0 1px rgba(255, 255, 255, 0.12);
}

#page1 .card-image,
#page1 .card-fallback {
  width: 100%;
  height: 100%;
  display: block;
}

#page1 .card-image {
  object-fit: cover;
}

#page1 .card-fallback {
  padding: 18px 16px;
  background:
    radial-gradient(circle at 30% 24%, rgba(255, 255, 255, 0.18), transparent 35%),
    linear-gradient(135deg, rgba(17, 35, 57, 0.96), rgba(9, 17, 32, 0.98));
  color: rgba(255, 255, 255, 0.94);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

#page1 .card-option {
  font-size: 14px;
  font-weight: 500;
  line-height: 18px;
  letter-spacing: -0.03em;
  color: rgba(255, 255, 255, 0.66);
}

#page1 .card-title {
  font-size: 24px;
  font-weight: 900;
  line-height: 24px;
  letter-spacing: -0.05em;
  text-transform: uppercase;
}

#page1 .card-artist {
  font-size: 13px;
  font-weight: 400;
  line-height: 16px;
  letter-spacing: -0.03em;
  color: rgba(255, 255, 255, 0.64);
}

#page1 .lyrics-container {
  position: absolute;
  top: 502px;
  left: 20px;
  right: 20px;
  text-align: center;
}

#page1 .lyrics-text {
  min-height: 60px;
  font-size: 20px;
  font-weight: 500;
  line-height: 30px;
  letter-spacing: -0.05em;
  color: var(--text-primary);
  opacity: 0;
  transition: opacity 0.14s ease;
}

#page1 .lyrics-text.visible {
  opacity: 1;
}

#page1 .lyrics-text.shrink {
  font-size: 18px;
}

#page1 .glow-word {
  color: var(--word-glow);
  font-weight: 900;
  text-shadow:
    0 0 8px #64D6FF,
    0 0 18px rgba(100, 214, 255, 0.4),
    0 0 30px rgba(100, 214, 255, 0.2);
}

#page1 .song-info {
  margin-top: 8px;
  min-height: 30px;
  font-size: 16px;
  font-weight: 500;
  line-height: 30px;
  letter-spacing: -0.05em;
  color: var(--text-secondary);
  opacity: 0;
  transition: opacity 0.14s ease;
}

#page1 .song-info.visible {
  opacity: 1;
}

#page1 .swipe-hint {
  position: absolute;
  top: 637px;
  left: 50%;
  width: 176px;
  height: 62px;
  transform: translateX(-50%);
  opacity: 0.86;
}

#page1 .swipe-hint svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}

#page1 .swipe-path {
  fill: none;
  stroke: rgba(255, 255, 255, 0.72);
  stroke-width: 1.75;
  stroke-linecap: round;
  stroke-dasharray: 178;
  stroke-dashoffset: 178;
  animation: arc-grow 2.4s ease-in-out infinite;
}

@keyframes arc-grow {
  0% {
    stroke-dashoffset: 178;
  }
  60% {
    stroke-dashoffset: 0;
  }
  100% {
    stroke-dashoffset: 178;
  }
}

#page1 .swipe-text-path {
  fill: none;
  stroke: none;
}

#page1 .swipe-label {
  font-size: 14px;
  font-weight: 500;
  line-height: 30px;
  letter-spacing: -0.01em;
  fill: rgba(255, 255, 255, 0.7);
}

#page1 .next-btn {
  position: absolute;
  top: 776px;
  left: 50%;
  width: 116px;
  height: 34px;
  transform: translateX(-50%);
  border: 0;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.16);
  color: rgba(255, 255, 255, 0.96);
  font-family: 'DM Sans', sans-serif;
  font-size: 20px;
  font-weight: 300;
  line-height: 30px;
  letter-spacing: -0.05em;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.08),
    0 8px 18px rgba(0, 0, 0, 0.22);
  cursor: pointer;
  transition:
    transform 0.2s ease,
    background 0.2s ease,
    opacity 0.2s ease;
}

#page1 .next-btn:hover {
  background: rgba(255, 255, 255, 0.22);
}

#page1 .next-btn:active {
  transform: translateX(-50%) scale(0.985);
}

#page1 .next-btn:disabled {
  cursor: default;
  opacity: 0.82;
}

#page1 .status-note {
  position: absolute;
  left: 20px;
  right: 20px;
  bottom: 18px;
  font-size: 12px;
  font-weight: 400;
  line-height: 16px;
  letter-spacing: -0.02em;
  color: rgba(255, 255, 255, 0.34);
  text-align: center;
  opacity: 0;
  transition: opacity 0.2s ease;
}

#page1 .status-note.visible {
  opacity: 1;
}

/* ═══════════════════════════════════════════
   PAGE 2: SONG PICKER STYLES
   ═══════════════════════════════════════════ */
#page2 {
  background: #1e2231;
  color: #fff;
}

#page2 .container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

#page2 .title-area {
  padding-top: 78px;
  padding-left: 20px;
  padding-right: 20px;
  flex-shrink: 0;
}

#page2 .title-line {
  margin-bottom: 22px;
  line-height: 30px;
  letter-spacing: -0.05em;
}

#page2 .title-line .light {
  font-size: 20px;
  font-weight: 500;
}

#page2 .title-line .bold {
  font-size: 24px;
  font-weight: 900;
}

#page2 .subtitle {
  font-size: 12px;
  font-weight: 200;
  line-height: 30px;
  letter-spacing: -0.05em;
  margin-bottom: 16px;
  opacity: 0.8;
}

#page2 .capsule-area {
  padding-left: 20px;
  padding-right: 20px;
  margin-bottom: 14px;
  min-height: 34px;
  flex-shrink: 0;
  display: flex;
  gap: 7px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

#page2 .capsule-area::-webkit-scrollbar {
  display: none;
}

#page2 .capsule {
  display: inline-flex;
  align-items: center;
  justify-content: space-between;
  width: 140px;
  height: 34px;
  border-radius: 17px;
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 0 12px;
  flex: 0 0 auto;
}

#page2 .capsule-text {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: -0.05em;
  line-height: 30px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100px;
}

#page2 .capsule-close {
  width: 16px;
  height: 16px;
  border: 0;
  background: none;
  color: rgba(255, 255, 255, 0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  line-height: 16px;
  cursor: pointer;
  flex-shrink: 0;
  margin-left: 4px;
}

#page2 .divider {
  width: 382px;
  height: 1px;
  background: rgba(255, 255, 255, 0.15);
  margin: 0 auto 14px;
  flex-shrink: 0;
}

#page2 .search-area {
  padding: 0 20px;
  margin-bottom: 27px;
  flex-shrink: 0;
}

#page2 .search-bar {
  width: 362px;
  height: 42px;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  display: flex;
  align-items: center;
  padding: 0 14px;
}

#page2 .search-bar svg {
  width: 18px;
  height: 18px;
  opacity: 0.5;
  flex-shrink: 0;
  margin-right: 10px;
}

#page2 .search-bar input {
  flex: 1;
  min-width: 0;
  background: none;
  border: none;
  outline: none;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  line-height: 30px;
  letter-spacing: -0.05em;
}

#page2 .search-bar input::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

#page2 .song-grid-wrapper {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 20px 140px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

#page2 .song-grid-wrapper::-webkit-scrollbar {
  display: none;
}

#page2 .song-grid {
  display: grid;
  grid-template-columns: repeat(3, 106px);
  gap: 14px 22px;
  justify-content: center;
}

#page2 .song-item {
  width: 106px;
  border: 0;
  padding: 0;
  background: none;
  color: inherit;
  font: inherit;
  cursor: pointer;
}

#page2 .cover {
  width: 106px;
  height: 106px;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  background: #333;
}

#page2 .cover img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

#page2 .selected-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.15);
  border: 2px solid rgba(255, 255, 255, 0.6);
  border-radius: 6px;
}

#page2 .song-item.selected .selected-overlay {
  display: flex;
}

#page2 .check-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
}

#page2 .check-icon svg {
  width: 16px;
  height: 16px;
}

#page2 .song-name {
  font-size: 16px;
  font-weight: 400;
  line-height: 18px;
  letter-spacing: -0.05em;
  margin-top: 5px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: center;
}

#page2 .song-artist {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 200;
  line-height: 12px;
  letter-spacing: -0.05em;
  color: rgba(255, 255, 255, 0.6);
  text-align: center;
  margin-top: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#page2 .confirm-area {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

#page2 .confirm-btn {
  width: 216px;
  height: 62px;
  border-radius: 31px;
  background: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.3);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  font-weight: 900;
  line-height: 30px;
  letter-spacing: -0.05em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: background 0.2s ease, transform 0.2s ease;
}

#page2 .confirm-btn:hover {
  background: rgba(255, 255, 255, 0.18);
}

#page2 .confirm-btn:active {
  transform: scale(0.985);
}

#page2 .confirm-btn svg {
  width: 20px;
  height: 20px;
}

#page2 .bottom-gradient {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 140px;
  background: linear-gradient(to top, #1e2231 40%, transparent);
  pointer-events: none;
  z-index: 5;
}

/* ═══════════════════════════════════════════
   PAGE 3: GENERATE BUTTON STYLES
   ═══════════════════════════════════════════ */
#page3 {
  background:
    radial-gradient(circle at 50% 18%, rgba(38, 85, 139, 0.48) 0%, transparent 42%),
    radial-gradient(circle at 50% 76%, rgba(63, 103, 170, 0.18) 0%, transparent 40%),
    linear-gradient(180deg, #0a1625 0%, #08111c 48%, #060d15 100%);
}

#page3::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px),
    radial-gradient(circle at 77% 26%, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px),
    radial-gradient(circle at 24% 56%, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px),
    radial-gradient(circle at 86% 84%, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px);
  opacity: 0.82;
}

#page3 .page-inner {
  position: relative;
  width: 100%;
  height: 100%;
}

#page3 .page-inner::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 50%;
  width: 270px;
  height: 270px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(78, 121, 188, 0.18) 0%, rgba(78, 121, 188, 0.06) 34%, transparent 68%);
  filter: blur(12px);
  pointer-events: none;
}

#page3 .content {
  position: absolute;
  left: 20px;
  right: 20px;
  top: 50%;
  transform: translateY(-49%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  z-index: 1;
}

#page3 .question {

/* ═══════════════════════════════════════════
   SHARED: Responsive Scaling
   ═══════════════════════════════════════════ */
function applyResponsiveScale() {
  var sourceWidth = 402;
  var sourceHeight = 874;
  var draftWidth = 750;
  var draftHeight = draftWidth * sourceHeight / sourceWidth;
  var fit = Math.min(window.innerWidth / draftWidth, window.innerHeight / draftHeight);
  document.documentElement.style.setProperty('--page-scale', String(fit * (draftWidth / sourceWidth)));
}

function getPageScale() {
  var value = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--page-scale'));
  return Number.isFinite(value) && value > 0 ? value : 1;
}

function normalizePointerX(clientX) {
  return clientX / getPageScale();
}

window.addEventListener('resize', applyResponsiveScale);
window.addEventListener('orientationchange', applyResponsiveScale);
applyResponsiveScale();

/* ═══════════════════════════════════════════
   SHARED: Cross-page communication hooks
   ═══════════════════════════════════════════ */
var page4StartLoading = null;
var page5InitSummary = null;

/* ═══════════════════════════════════════════
   PAGE TRANSITION CONTROLLER
   ═══════════════════════════════════════════ */
var currentPage = 0;
var transitioning = false;

function goToPage(nextIdx) {
  if (transitioning) return;
  transitioning = true;

  if (currentPage === 0 && nextIdx === 1) {
    document.getElementById('page0').classList.add('exit-left');
    document.getElementById('page1').classList.add('active');
    setTimeout(function() {
      document.getElementById('page1').classList.remove('from-right');
      if (window.p1OnPageEnter) window.p1OnPageEnter();
    }, 650);
  } else {
    var curPage = document.getElementById('page' + currentPage);
    var nextPage = document.getElementById('page' + nextIdx);
    curPage.classList.add('exit-up');
    curPage.classList.remove('active');
    nextPage.classList.add('active');
  }

  currentPage = nextIdx;
  setTimeout(function() { transitioning = false; }, 600);
}

function goBack() {
  if (transitioning || currentPage <= 1) return;
  transitioning = true;
  var prevIdx = currentPage - 1;
  var curPage = document.getElementById('page' + currentPage);
  var prevPage = document.getElementById('page' + prevIdx);
  prevPage.classList.remove('exit-up');
  prevPage.classList.add('active');
  curPage.classList.remove('active');
  currentPage = prevIdx;
  setTimeout(function() { transitioning = false; }, 600);
}

function goBackToPage0() {
  if (transitioning || currentPage !== 1) return;
  transitioning = true;
  document.getElementById('page1').classList.add('from-right');
  document.getElementById('page1').classList.remove('active');
  document.getElementById('page0').classList.remove('exit-left');
  currentPage = 0;
  setTimeout(function() { transitioning = false; }, 600);
}

/* Swipe detection */
(function initSwipeBack() {
  var startY = 0, startX = 0;
  var isSwiping = false;
  var wrapper = document.querySelector('.pages-wrapper');

  wrapper.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    isSwiping = true;
  }, { passive: true });

  wrapper.addEventListener('touchend', function(e) {
    if (!isSwiping) return;
    isSwiping = false;
    if (transitioning) return;

    var deltaY = e.changedTouches[0].clientY - startY;
    var deltaX = e.changedTouches[0].clientX - startX;

    if (deltaY < 60 || Math.abs(deltaY) < Math.abs(deltaX) * 1.5) return;

    if (currentPage === 2) {
      var scrollEl = document.getElementById('p2-song-grid-wrapper');
      if (scrollEl && scrollEl.scrollTop > 5) return;
    }
    if (currentPage === 5) {
      var scrollEl5 = document.getElementById('p5-tracks-area');
      if (scrollEl5 && scrollEl5.scrollTop > 5) return;
    }

    if (currentPage === 1) {
      if (window.p1GetQuestionIndex && window.p1GetQuestionIndex() > 0) {
        window.p1GoToPrevQuestion();
      } else {
        goBackToPage0();
      }
    } else if (currentPage > 1) {
      goBack();
    }
  }, { passive: true });

  var mouseDown = false;
  wrapper.addEventListener('mousedown', function(e) {
    startY = e.clientY;
    startX = e.clientX;
    mouseDown = true;
  });

  wrapper.addEventListener('mouseup', function(e) {
    if (!mouseDown) return;
    mouseDown = false;
    if (transitioning) return;

    var deltaY = e.clientY - startY;
    var deltaX = e.clientX - startX;

    if (deltaY < 60 || Math.abs(deltaY) < Math.abs(deltaX) * 1.5) return;

    if (currentPage === 2) {
      var scrollEl = document.getElementById('p2-song-grid-wrapper');
      if (scrollEl && scrollEl.scrollTop > 5) return;
    }
    if (currentPage === 5) {
      var scrollEl5 = document.getElementById('p5-tracks-area');
      if (scrollEl5 && scrollEl5.scrollTop > 5) return;
    }

    if (currentPage === 1) {
      if (window.p1GetQuestionIndex && window.p1GetQuestionIndex() > 0) {
        window.p1GoToPrevQuestion();
      } else {
        goBackToPage0();
      }
    } else if (currentPage > 1) {
      goBack();
    }
  });
})();

        audio.src = option.audio;
      });

  function clearPlaylistContinueState() {
    if (questionIndex !== questions.length - 1 || !playlistReady) return;

  function optionIndexFromCurrent() {

  function currentOption() {
    return activeQuestion.options[optionIndexFromCurrent()];
  }

  function stopOptionAudio(resetState) {
    optionAudio.pause();
    try { optionAudio.currentTime = 0; } catch (error) {}
    if (resetState) { currentAudioKey = ''; currentAudioSrc = ''; }
  }

  function playCurrentOptionAudio(force) {
    var option = currentOption();
    if (!option || !option.audio) { stopOptionAudio(true); return; }

    var optionIdx = optionIndexFromCurrent();
    var nextAudioKey = questionIndex + '-' + optionIdx;
    if (!force && currentAudioKey === nextAudioKey && !optionAudio.paused) return;

    currentAudioKey = nextAudioKey;
    if (currentAudioSrc !== option.audio) {
      currentAudioSrc = option.audio;
      optionAudio.src = option.audio;
    }

    try { optionAudio.currentTime = 0; } catch (error) {}

    var playPromise = optionAudio.play();
    if (playPromise && typeof playPromise.catch === 'function') {
      playPromise.catch(function() {});
    }
  }

  function makeCard(option, optionIdx) {
    var item = document.createElement('div');
    item.className = 'carousel-item';
    item.dataset.optionIndex = String(optionIdx);

    var shell = document.createElement('div');
    shell.className = 'card-shell';

    if (option.image) {
      var img = document.createElement('img');
      img.className = 'card-image';
      img.src = option.image;
      img.alt = option.title;
      img.draggable = false;
      shell.appendChild(img);
    } else {
      var fallback = document.createElement('div');
      fallback.className = 'card-fallback';
      fallback.innerHTML =

        '<div class="card-artist">' + (option.title.split(' - ')[1] || '') + '</div>';
      shell.appendChild(fallback);
    }

    item.appendChild(shell);
    item.addEventListener('click', function() {
      if (dragMoved) return;
      clearPlaylistContinueState();
      var listIndex = itemEls.indexOf(item);
      if (listIndex >= 0) snapTo(listIndex, true);
    });
    return item;
  }

  function setTrackX(x, animated) {
    track.style.transition = animated ? 'transform 0.32s ease-out' : 'none';
    track.style.transform = 'translateX(' + x + 'px)';

  }

  function targetX(index) {
    return CENTER_X - (index * SLOT + SLOT / 2);
  }

  function activate(index) {
    itemEls.forEach(function(item, idx) {
      if (idx === index) item.classList.add('active');
      else item.classList.remove('active');
    });
  }

  function fitLyrics() {

  function showText() {

    fitLyrics();
    lyricsEl.classList.add('visible');
    infoEl.classList.add('visible');
  }

  function hideText() {
    lyricsEl.classList.remove('visible');
    infoEl.classList.remove('visible');
  }

  function wrapTrack() {
    if (currentIndex < optionCount) {
      currentIndex += optionCount;
      setTrackX(targetX(currentIndex), false);
    } else if (currentIndex >= optionCount * (SETS - 1)) {
      currentIndex -= optionCount;
      setTrackX(targetX(currentIndex), false);
    }
    activate(currentIndex);
  }

  function snapTo(index, animated) {
    currentIndex = index;

  function buildQuestion(index) {

        var card = makeCard(option, optionIdx);
        track.appendChild(card);
        itemEls.push(card);
      }
    });

    var normalizedItems = [];
    for (var set = 0; set < SETS; set += 1) {
      for (var optionIdx = 0; optionIdx < optionCount; optionIdx += 1) {

    /* 1. Clone current content as a snapshot */
    var snapshot = inner.cloneNode(true);
    snapshot.classList.add('q-snapshot');
    page1El.appendChild(snapshot);

    /* 2. Position real inner offscreen (no transition) */
    var enterClass = direction === 'forward' ? 'q-enter-from-below' : 'q-enter-from-above';
    inner.classList.add(enterClass);

    /* 3. Swap content while offscreen */
    buildQuestion(newIndex);

    /* 4. Force reflow, then animate both simultaneously */
    inner.offsetHeight;
    inner.classList.remove(enterClass);

    var exitClass = direction === 'forward' ? 'q-exit-up' : 'q-exit-down';
    snapshot.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
    snapshot.classList.add(exitClass);

    setTimeout(function() {

  function moveDrag(clientX) {
    if (!pointerDown) return;
    var now = Date.now();
    var dt = now - prevTime;
    if (dt > 0) velocity = (clientX - prevX) / dt;
    prevX = clientX;
    prevTime = now;

    var delta = clientX - startX;
    if (Math.abs(delta) > 6) dragMoved = true;

    var limitedDelta = Math.max(-SLOT, Math.min(SLOT, delta));
    var nextX = startTx + limitedDelta;

    currentX = nextX;

    var candidate = dragStartIndex;
    if (limitedDelta <= -SLOT / 2) candidate = dragStartIndex + 1;
    else if (limitedDelta >= SLOT / 2) candidate = dragStartIndex - 1;

    var clamped = Math.max(0, Math.min(totalItems - 1, candidate));
    if (clamped !== currentIndex) {
      currentIndex = clamped;
      activate(currentIndex);
      playCurrentOptionAudio(false);
    }
  }

    if (!pointerDown) return;
    pointerDown = false;
    track.classList.remove('dragging');

    var delta = currentX - startTx;
    var projectedDelta = delta + velocity * 72;
    var swipeThreshold = SLOT * 0.24;
    var step = 0;

    if (projectedDelta <= -swipeThreshold) step = 1;
    else if (projectedDelta >= swipeThreshold) step = -1;

    var targetIndex = Math.max(0, Math.min(totalItems - 1, dragStartIndex + step));
    snapTo(targetIndex, true);
    window.setTimeout(wrapTrack, 360);
  }

        var option = question.options[selectedIndex];
        var keywordMatch = option.lyric.match(/glow-word">([^<]+)/);
        return {
          question: idx + 1,
          titleLine1: question.titleLine1,
          titleLine2: question.titleLine2,
          selectedIndex: selectedIndex,

          selectedImage: option.image || null,

    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }

      return;
    }

    answers[questionIndex] = optionIndexFromCurrent();

  });

    page1Active = true;

  };

    page1Active = false;

      var parsed = JSON.parse(raw);

        '<button class="capsule-close" type="button" aria-label="Remove ' + song.name + '">&times;</button>';

      capsule.querySelector('.capsule-close').addEventListener('click', function(event) {
        event.stopPropagation();
        toggleSong(song.id);

      capsuleArea.appendChild(capsule);

        tracksBottom: tracksArea.style.bottom,
        tracksOverflow: tracksArea.style.overflowY,
        shareDisplay: saveShareArea.style.display,
        downloadDisplay: downloadBtnEl.style.display
      };

      // Hide buttons
      saveShareArea.style.display = 'none';
      downloadBtnEl.style.display = 'none';

      // Expand tracks to full height
      tracksArea.style.bottom = 'auto';
      tracksArea.style.overflowY = 'visible';
      pageInner.style.height = 'auto';
      pageInner.style.overflow = 'visible';

      var fullHeight = Math.max(874, tracksArea.offsetTop + tracksArea.scrollHeight + 40);

      // Flatten layout: remove body transform, make page5 fill naturally
      html.style.overflow = 'visible';
      body.style.position = 'static';
      body.style.transform = 'none';
      body.style.transformOrigin = '0 0';
      body.style.left = '0';
      body.style.top = '0';
      body.style.width = '402px';
      body.style.height = fullHeight + 'px';
      body.style.overflow = 'visible';
      wrapper.style.height = fullHeight + 'px';
      wrapper.style.overflow = 'visible';
      pageEl.style.position = 'relative';
      pageEl.style.height = fullHeight + 'px';
      pageEl.style.overflow = 'visible';

      function restore() {
        html.style.overflow = saved.htmlOverflow;
        body.style.position = saved.bodyPosition;
        body.style.transform = saved.bodyTransform;
        body.style.transformOrigin = saved.bodyTransformOrigin;
        body.style.left = saved.bodyLeft;
        body.style.top = saved.bodyTop;
        body.style.width = saved.bodyWidth;
        body.style.height = saved.bodyHeight;
        body.style.overflow = saved.bodyOverflow;
        wrapper.style.height = saved.wrapperHeight;
        wrapper.style.overflow = saved.wrapperOverflow;
        pageEl.style.position = saved.pagePosition;
        pageEl.style.height = saved.pageHeight;
        pageEl.style.overflow = saved.pageOverflow;
        pageInner.style.height = saved.pageInnerHeight;
        pageInner.style.overflow = saved.pageInnerOverflow;
        tracksArea.style.bottom = saved.tracksBottom;
        tracksArea.style.overflowY = saved.tracksOverflow;
        saveShareArea.style.display = saved.shareDisplay;
        downloadBtnEl.style.display = saved.downloadDisplay;
        otherPages.forEach(function(p) { p.el.style.display = p.display; });
        if (imgBackup) imgBackup.el.src = imgBackup.originalSrc;
      }

      return html2canvas(pageEl, {
        width: 402,
        height: fullHeight,
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#060d15',
        scrollX: 0,
        scrollY: 0,
        windowWidth: 402,
        windowHeight: fullHeight
      }).then(function(canvas) {
        restore();
        return canvas;
      }).catch(function(err) {
        restore();
        throw err;
      });
    });
  }

  /* download-btn: save only the AI poster image */
  function downloadPosterImage() {
    var posterImg = document.querySelector('#page5 .poster-image');
    if (!posterImg || !posterImg.src) return;
    fetch(posterImg.src).then(function(resp) { return resp.blob(); }).then(function(blob) {
      var url = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.href = url;
      link.download = 'my-funeral-poster.png';
      link.click();
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    }).catch(function(err) {
      console.error('Poster download failed:', err);
    });
  }

  /* save-share-btn: capture full page screenshot, auto-save + share */
  function saveAndShareScreenshot() {
    captureFullPage().then(function(canvas) {
      return new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
    }).then(function(blob) {
      if (!blob) return;
      /* auto-save via download */
      var url = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.href = url;
      link.download = 'my-funeral-playlist.png';
      link.click();

      /* share if supported */
      if (navigator.share) {
        var file = new File([blob], 'my-funeral-playlist.png', { type: 'image/png' });
        navigator.share({ title: 'My Funeral Playlist', files: [file] }).catch(function() {});
      }
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    }).catch(function(error) {
      console.error('Screenshot failed:', error);
    });
  }

  downloadBtn.addEventListener('click', downloadPosterImage);

  saveShareBtn.addEventListener('click', saveAndShareScreenshot);

  function initSummary() {
    var songs = resolveSongs();
    var keywords = resolveKeywords();
    var scene = resolveAiScene();

    renderPoster(scene);
    renderTracks(songs);
    userIdEl.textContent = buildUserId();
    keywordsEl.textContent = keywords.length ? keywords.join('  |  ') : 'keyword pending';
  }

  page5InitSummary = initSummary;
})();
</script>
</body>
</html>
